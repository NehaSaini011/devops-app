name: Docker CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t myapp .

    - name: Run Container
      run: docker run -d -p 5000:5000 myapp